name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.7"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API
        working-directory: apps/api
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"
      - name: Ruff
        working-directory: apps/api
        run: .venv/bin/ruff check qorba_api tests
      - name: Pytest
        working-directory: apps/api
        run: .venv/bin/pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        run: pnpm --filter @qorba/web typecheck
      - name: Build
        run: pnpm --filter @qorba/web build

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.7"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install API
        working-directory: apps/api
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"
      - name: Check OpenAPI codegen drift
        run: bash scripts/codegen.sh --check
